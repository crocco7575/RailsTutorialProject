services:
  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/myapp
    ports:
      - "3000:3000"
    depends_on:
      - mailcatcher

  mailcatcher:
    image: sj26/mailcatcher
    ports:
      - "1080:1080" # Web interface
      - "1025:1025"